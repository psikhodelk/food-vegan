<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой План Питания</title>
    <style>
        /* Новая пастельно-травяная цветовая гамма */
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: #f2f1ed; color: #4a4a4a; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        h1 { text-align: center; color: #2c3e50; font-size: 1.5em; border-bottom: 2px solid #a3b19b; padding-bottom: 12px; margin-bottom: 20px; letter-spacing: 0.5px; }
        .alert { background: #fdf6ec; border-left: 4px solid #e6a23c; padding: 12px; margin-bottom: 20px; border-radius: 6px; font-size: 0.85em; color: #b88230; }
        
        /* Сетка трекера в шалфейных тонах */
        .tracker-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 10px; }
        .day-card { background: #a3b19b; color: white; padding: 20px; border-radius: 12px; text-align: center; font-weight: 600; cursor: pointer; transition: transform 0.2s, background-color 0.2s; box-shadow: 0 4px 12px rgba(163, 177, 155, 0.2); letter-spacing: 0.3px; }
        .day-card:hover { transform: translateY(-3px); background-color: #8f9f85; }
        .day-card.weekend { background: #8fa4b8; box-shadow: 0 4px 12px rgba(143, 164, 184, 0.2); }
        .day-card.weekend:hover { background-color: #7991a8; }
        .full-width { grid-column: span 2; }

        /* Всплывающее окно (Модальное) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(44, 62, 80, 0.4); align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-content { background-color: #ffffff; padding: 25px; border-radius: 16px; width: 90%; max-width: 450px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); position: relative; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 28px; font-weight: bold; color: #95a5a6; cursor: pointer; }
        .close-btn:hover { color: #34495e; }
        
        /* Стили текста в модальном окне */
        .modal-title { color: #2c3e50; font-size: 1.3em; margin-top: 0; border-bottom: 1px solid #f2f1ed; padding-bottom: 8px; margin-bottom: 15px; }
        .schedule-item { margin-bottom: 12px; border-left: 3px solid #a3b19b; padding-left: 10px; }
        .time { font-weight: 600; color: #2c3e50; font-size: 0.95em; }
        .supplement { color: #8e6b9e; font-weight: bold; font-size: 0.9em; }
        .meal { font-weight: bold; color: #5a7d65; }
        ul { padding-left: 18px; margin: 4px 0; font-size: 0.9em; color: #555; }

        /* Динамический блок списка покупок внутри модалки */
        .shopping-section { background: #f9f8f6; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #f2f1ed; }
        .shopping-section h4 { color: #2c3e50; font-size: 1em; margin-top: 0; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #e8e6e1; padding-bottom: 5px; }
        .checklist-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.9em; color: #555; }
        .checklist-item input { margin-right: 10px; transform: scale(1.1); cursor: pointer; }
        .store-label { font-size: 0.8em; color: #a3b19b; font-weight: bold; margin-left: 5px; }
        
        .footer-note { text-align: center; font-size: 0.75em; color: #999; margin-top: 20px; border-top: 1px solid #f2f1ed; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Мой Трекер Питания</h1>
        
        <div class="alert">
            <strong>⚠️ Памятка:</strong> Зеленый чай пейте за 1 час до или через 1 час после еды. Сон — 5.5 часов.
        </div>

        <!-- Сетка с днями -->
        <div class="tracker-grid">
            <div class="day-card" onclick="openModal('mon-tue')">Пн & Вт</div>
            <div class="day-card" onclick="openModal('wed-thu')">Ср & Чт</div>
            <div class="day-card full-width" onclick="openModal('fri')">Пятница (Разгрузка)</div>
            <div class="day-card weekend full-width" onclick="openModal('weekend')">Суббота и Воскресенье</div>
        </div>
        
        <div class="footer-note">Нажмите на день, чтобы увидеть график и список покупок для него.</div>
    </div>

    <!-- Модальное окно -->
    <div id="myModal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="document.getElementById('myModal').style.display = 'none'">&times;</span>
            <div id="modal-text"></div>
        </div>
    </div>

    <script>
        // База данных для модалок (график + умный список покупок)
        const data = {
            'mon-tue': `

                <div class="schedule-item"><span class="time">05:45</span> — 🏃‍♀️ Разминка (20 мин)</div>
                <div class="schedule-item"><span class="time">06:55</span> — <span class="supplement">🧪 Drain (1 порция)</span></div>
                <div class="schedule-item">
                    <span class="time">13:00</span> — <span class="meal">🥗 ОБЕД</span>
                    <ul>
                        <li>Гречка</li>

                </div>
                <div class="schedule-item">

                <div class="schedule-item"><span class="time">00:00</span> — 😴 Сон (на пустой желудок)</div>

                <div class="shopping-section">
                    <h4>Что купить на эти дни:</h4>
                    <div class="checklist-item"><input type="checkbox"><span>Фасоль «Маркет» <span class="store-label">[Перекресток]</span></span></div>
                    <div class="checklist-item"><input type="checkbox"><span>Свежие огурцы (2 шт.) <span class="store-label">[Везде]</span></span></div>
                    <div class="checklist-item"><input type="checkbox"><span>Зеленые яблоки (2 шт.) <span class="store-label">[Везде]</span></span></div>
                    <div class="checklist-item"><input type="checkbox"><span>Сырые орехи (60 г) <span class="store-label">[Перекресток/Евроспар]</span></span></div>
                </div>
            `,
            'wed-thu': `
                <h3 class="modal-title">Среда & Четверг</h3>
                <div class="schedule-item"><span class="time">05:35</span> — <span class="supplement">💊 L-carnitine (60 мл)</span></div>
                <div class="schedule-item"><span class="time">05:45</span> — 🏃‍♀️ Разминка (20 мин)</div>
                <div class="schedule-item"><span class="time">06:55</span> — <span class="supplement">🧪 Drain (1 порция)</span></div>
                <div class="schedule-item">
                    <span class="time">13:00</span> — <span class="meal">🍛 ОБЕД</span>
                    <ul>
                        <li>Рис или гречка</li>
                        <li>Стручковая фасоль</li>

                    </ul>

                </div>
                <div class="schedule-item">
                    <span class="time">18:00</span> — <span class="meal">🍏 ПЕРЕКУС (в вузе)</span>

                        <li>30 г орехов</li>

                    </ul>
                </div>

                <div class="schedule-item"><span class="time">00:00</span> — 😴 Сон (на пустой желудок)</div>

                <div class="shopping-section">
                    <h4>Что купить на эти дни:</h4>
                    <div class="checklist-item"><input type="checkbox"><span>Заморож. стручковая фасоль <span class="store-label">[Везде]</span></span></div>
                    <div class="checklist-item"><input type="checkbox"><span>Зеленые яблоки (2 шт.) <span class="store-label">[Везде]</span></span></div>
                    <div class="checklist-item"><input type="checkbox"><span>Цельнозерновые хлебцы <span class="store-label">[Везде]</span></span></div>

            'fri': `

                    <span class="time">13:00</span> — <span class="meal">🥗 ОБЕД</span>
                    <ul>
                        <li>Пюре из красной чечевицы</li>
                        <li>Свежий огурец</li>
                    </ul>
                    <span class="supplement">💊 Пиколинат хрома (в процессе)</span>
                </div>
                <div class="schedule-item">
                    <span class="time">18:00</span> — <span class="meal">🍏 ПЕРЕКУС (в вузе)</span>
                    <ul>
                        <li>30 г орехов</li>
                        <li>1 зеленое яблоко</li>
                    </ul>
                </div>
                <div class="schedule-item"><span class="time">23:45</span> — <span class="supplement">💊 Магний хелат</span></div>
                <div class="schedule-item"><span class="time">00:00</span> — 😴 Сон (на пустой желудок)</div>

                <div class="shopping-section">
                    <h4>Что купить на этот день:</h4>
                    <div class="checklist-item"><input type="checkbox"><span>Свежий огурец (1 шт.) <span class="store-label">[Везде]</span></span></div>
                    <div class="checklist-item"><input type="checkbox"><span>Зеленое яблоко (1 шт.) <span class="store-label">[Везде]</span></span></div>
                    <div class="checklist-item"><input type="checkbox"><span>Сырые орехи (30 г) <span class="store-label">[Перекресток/Евроспар]</span></span></div>
                </div>

            'weekend': `
                <h3 class="modal-title">Суббота & Воскресенье</h3>
                <div class="schedule-item"><span class="time">05:35</span> — <span class="supplement">💊 L-carnitine (60 мл)</span></div>
                <div class="schedule-item"><span class="time">05:45</span> — 🏃‍♀️ Разминка (20 мин)</div>
                <div class="schedule-item"><span class="time">06:55</span> — <span class="supplement">🧪 Drain (1 порция)</span></div>
                <div class="schedule-item">
                    <span class="time">13:00</span> — <span class="meal">🍛 ОБЕД</span>
                    <ul>
                        <li>Крупа на выбор</li>
                        <li>Стручковая фасоль</li>
                        <li>Чечевица или фасоль</li>
                    </ul>
                    <span class="supplement">💊 Пиколинат хрома (в процессе)</span>
                </div>
                <div class="schedule-item">
                    <span class="time">18:00</span> — <span class="meal">🍏 ПЕРЕКУС</span>
                    <ul>
                        <li>30 г орехов</li>
                        <li>1 яблоко</li>
                    </ul>
                </div>
                <div class="schedule-item"><span class="time">23:45</span> — <span class="supplement">💊 Магний хелат</span></div>
                <div class="schedule-item"><span class="time">00:00</span> — 😴 Сон</div>

                <div class="shopping-section">
                    <h4>Что купить на выходные:</h4>
                    <div class="checklist-item"><input type="checkbox"><span>Зеленые яблоки (2 шт.) <span class="store-label">[Везде]</span></span></div>
                    <div class="checklist-item"><input type="checkbox"><span>Заморож. стручковая фасоль <span class="store-label">[Везде]</span></span></div>
                    <div class="checklist-item"><input type="checkbox"><span>Сырые орехи (60 г) <span class="store-label">[Перекресток/Евроспар]</span></span></div>
                </div>
            `
        };

        function openModal(day) {
            document.getElementById('modal-text').innerHTML = data[day];
            document.getElementById('myModal').style.display = 'flex';
        }

        function closeModal(event) {
            if (event.target === document.getElementById('myModal')) {
                document.getElementById('myModal').style.display = 'none';
            }
        }
    </script>
</body>
</html>
