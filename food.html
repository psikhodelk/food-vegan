<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План Питания и Тренировок</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 16px; display: none; }
        h1 { text-align: center; color: #ffffff; font-size: 1.5em; border-bottom: 2px solid #2e7d32; padding-bottom: 10px; }
        .today-banner { background: #1c2e20; border: 1px solid #2e7d32; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; color: #81c784; font-weight: bold; }
        .menu-grid { display: grid; gap: 15px; }
        .menu-btn { background: #2a2a2a; color: #fff; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #3a3a3a; }
        .section-content { display: none; }
        .section-content.active { display: block; }
        .day-card { background: #2a2a2a; color: #fff; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #3a3a3a; }
        .day-card.today { border: 2px solid #81c784; background-color: #1c2e20; }
        .tracker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background-color: #1e1e1e; padding: 20px; border-radius: 16px; width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
        .close-btn { color: #aaa; float: right; font-size: 28px; cursor: pointer; }
        #auth-screen { text-align: center; margin-top: 100px; }
        input, button { padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid #444; }
        button { background: #2e7d32; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <h2>Введите код доступа</h2>
        <input type="password" id="access-code" placeholder="Пароль">
        <button onclick="checkAuth()">Войти</button>
    </div>
    <div class="container" id="main-app">
        <div id="main-menu">
            <h1>Мой План</h1>
            <div id="current-day-banner" class="today-banner"></div>
            <div class="menu-grid">
                <div class="menu-btn" onclick="showSection('nutrition-sec')">🍎 План Питания</div>
            </div>
        </div>
        <div id="nutrition-sec" class="section-content">
            <button onclick="showMainMenu()">Назад</button>
            <div class="tracker-grid">
                <div class="day-card" id="day-1" onclick="openModal('mon')">ПН</div>
                <div class="day-card" id="day-2" onclick="openModal('tue')">ВТ</div>
                <div class="day-card" id="day-3" onclick="openModal('wed')">СР</div>
                <div class="day-card" id="day-4" onclick="openModal('thu')">ЧТ</div>
                <div class="day-card" id="day-5" onclick="openModal('fri')">ПТ</div>
                <div class="day-card" id="day-6" onclick="openModal('sat')">СБ</div>
                <div class="day-card" id="day-7" onclick="openModal('sun')">ВС</div>
            </div>
        </div>
    </div>
    <div id="myModal" class="modal"><div class="modal-content"><span class="close-btn" onclick="closeModal()">&times;</span><div id="modal-data"></div></div></div>
    <script>
        function checkAuth() {
            if (document.getElementById('access-code').value === 'Ника Титова') {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                updateCurrentDay();
            }
        }
        function updateCurrentDay() {
            const now = new Date();
            const dayIndex = now.getDay();
            const dateStr = now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
            const dayNamesRu = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
            document.getElementById('current-day-banner').innerText = `Сегодня: ${dayNamesRu[dayIndex]}, ${dateStr}`;
            let calendarId = dayIndex === 0 ? 7 : dayIndex;
            document.getElementById(`day-${calendarId}`).classList.add('today');
        }
        function showSection(id) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }
        function showMainMenu() {
            document.querySelectorAll('.section-content').forEach(s => s.style.display = 'none');
            document.getElementById('main-menu').style.display = 'block';
        }
        const schedules = {
            mon: '05:30 Подъем, 05:40 L-carnitine, 07:20 Завтрак (овсянка), 13:00 Обед (гречка), 22:30 Ужин (тофу), 23:30 Магний.',
            tue: '05:30 Подъем, 05:40 L-carnitine, 07:20 Завтрак (овсянка), 13:00 Обед (рис), 22:30 Ужин (салат), 23:30 Магний.',
            // ... (аналогично для остальных дней)
            sun: 'Отдых и подготовка мультиварки.'
        };
        function openModal(day) {
            document.getElementById('myModal').style.display = 'flex';
            document.getElementById('modal-data').innerText = schedules[day] || 'План на этот день...';
        }
        function closeModal() { document.getElementById('myModal').style.display = 'none'; }
    </script>
</body>
</html>
